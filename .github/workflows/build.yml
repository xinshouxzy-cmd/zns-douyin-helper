name: Build Windows Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write   # 允许创建 Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        shell: bash
        run: |
          VER="v2.0.${{ github.run_number }}"
          VER_NUM="2.0.${{ github.run_number }}"
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "VERSION_NUM=$VER_NUM" >> $GITHUB_ENV
          echo "BUILD_ID=${{ github.run_number }}" >> $GITHUB_ENV
          echo "VERSION = \"$VER\"" > _version.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyinstaller selenium webdriver-manager PyQt5 pyperclip openpyxl

      - name: Download ChromeDriver (Windows)
        shell: pwsh
        run: |
          python -c "
          from webdriver_manager.chrome import ChromeDriverManager
          import shutil, os
          src = ChromeDriverManager().install()
          os.makedirs('runtime', exist_ok=True)
          dst = os.path.join('runtime', 'chromedriver.exe')
          shutil.copy2(src, dst)
          # 也复制到构建根目录（find_chromedriver 会查这里）
          shutil.copy2(src, 'chromedriver.exe')
          print(f'ChromeDriver bundled: {dst}')
          "

      - name: Create data dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path replied_records | Out-Null
          New-Item -ItemType Directory -Force -Path chrome_profiles | Out-Null
          "" | Out-File -FilePath replied_records\.gitkeep -Encoding UTF8
          "" | Out-File -FilePath chrome_profiles\.gitkeep -Encoding UTF8

      - name: Build
        shell: pwsh
        run: |
          pyinstaller --onedir --windowed --name "遵农商_抖音客服助手" `
            --add-data "config.json;." `
            --add-data "worker.py;." `
            --add-data "_version.py;." `
            --add-data "replied_records;replied_records" `
            --add-data "chrome_profiles;chrome_profiles" `
            --add-data "comment_data;comment_data" `
            --add-data "runtime;runtime" `
            --add-binary "chromedriver.exe;." `
            --collect-all PyQt5 `
            --collect-all selenium `
            --collect-all webdriver_manager `
            main.py

      - name: Add readme
        shell: pwsh
        run: |
          @"
          遵农商·抖音客服助手 v$env:VERSION
          ===================================

          【使用前请确保已安装 Chrome 浏览器】
            如未安装，请先下载: https://www.google.cn/chrome/

          【使用方法】
            双击 遵农商_抖音客服助手.exe 即可运行
            首次使用需扫码登录抖音创作者平台

          【功能】
            - 多账号抖音私信自动回复
            - 多账号抖音评论自动回复

          遵义农商银行 出品
          "@ | Out-File -FilePath "dist\遵农商_抖音客服助手\使用说明.txt" -Encoding UTF8

      - name: Package zip
        shell: pwsh
        run: |
          @'
          import shutil, os
          src = r'dist\遵农商_抖音客服助手'
          dst = f'遵农商_抖音客服助手_v{os.environ["VERSION_NUM"]}'
          shutil.make_archive(dst, 'zip', src)
          print('Created: ' + dst + '.zip')
          '@ | Out-File -FilePath pack.py -Encoding UTF8
          $env:PYTHONIOENCODING = 'utf-8'
          python pack.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "遵农商_抖音客服助手_v${{ env.VERSION_NUM }}"
          path: "dist/遵农商_抖音客服助手/**"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ env.VERSION }}-${{ env.BUILD_ID }}"
          name: "遵农商·抖音客服助手 ${{ env.VERSION }} (Build ${{ env.BUILD_ID }})"
          files: "遵农商_抖音客服助手_v${{ env.VERSION_NUM }}.zip"
          prerelease: false
        continue-on-error: true
