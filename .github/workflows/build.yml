name: Build Windows Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from commit
        shell: bash
        run: |
          VER=$(git log -1 --pretty=%s | grep -oP '^v[\d.]+' || echo "v1.0.0")
          echo "VERSION=$VER" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyinstaller selenium webdriver-manager PyQt5 pyperclip

      - name: Create data dirs
        run: |
          mkdir replied_records 2>nul
          mkdir chrome_profiles 2>nul
          mkdir comment_data 2>nul
          echo. > replied_records\.gitkeep
          echo. > chrome_profiles\.gitkeep
          echo. > comment_data\.gitkeep

      - name: Get chromedriver
        run: python -c "from webdriver_manager.chrome import ChromeDriverManager; p = ChromeDriverManager().install(); import shutil; shutil.copy(p, 'chromedriver.exe')"

      - name: Build
        shell: pwsh
        run: |
          $name = "遵农商_抖音客服助手_$env:VERSION"
          pyinstaller --onedir --windowed --name $name `
            --add-data "config.json;." `
            --add-data "worker.py;." `
            --add-data "chromedriver.exe;." `
            --add-data "replied_records;replied_records" `
            --add-data "chrome_profiles;chrome_profiles" `
            --add-data "comment_data;comment_data" `
            --collect-all PyQt5 `
            --collect-all selenium `
            main.py

      - name: Add readme
        shell: pwsh
        run: |
          $name = "遵农商_抖音客服助手_$env:VERSION"
          @"
          遵农商·抖音客服助手 $env:VERSION

          双击 $name.exe 即可运行。
          首次使用需扫码登录抖音创作者平台。

          遵义农商银行 出品
          "@ | Out-File -FilePath "dist\$name\使用说明.txt" -Encoding UTF8

      - name: Package
        shell: pwsh
        run: |
          $name = "遵农商_抖音客服助手_$env:VERSION"
          Compress-Archive -Path "dist\$name\*" -DestinationPath "$name.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: "遵农商_抖音客服助手_${{ env.VERSION }}"
          path: "*.zip"
