name: Build Windows Package

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        shell: bash
        run: |
          VER=$(git log -1 --pretty=%s | grep -oP 'v[\d.]+' | head -1 || echo "v2.0")
          echo "VERSION=$VER" >> $GITHUB_ENV
          echo "BUILD_ID=${{ github.run_number }}" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyinstaller selenium webdriver-manager PyQt5 pyperclip

      - name: Create data dirs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path replied_records | Out-Null
          New-Item -ItemType Directory -Force -Path chrome_profiles | Out-Null
          "" | Out-File -FilePath replied_records\.gitkeep -Encoding UTF8
          "" | Out-File -FilePath chrome_profiles\.gitkeep -Encoding UTF8

      - name: Download ChromeDriver
        shell: pwsh
        run: |
          Write-Host "下载 ChromeDriver..."
          $ver = (Invoke-RestMethod 'https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions.json').channels.Stable.version
          Write-Host "版本: $ver"
          Invoke-WebRequest "https://storage.googleapis.com/chrome-for-testing-public/$ver/win64/chromedriver-win64.zip" -OutFile "chromedriver.zip"
          Expand-Archive "chromedriver.zip" -DestinationPath "." -Force
          Move-Item "chromedriver-win64/chromedriver.exe" "chromedriver.exe" -Force
          Remove-Item "chromedriver.zip" -Force
          Remove-Item "chromedriver-win64" -Recurse -Force
          Write-Host "ChromeDriver 就绪"

      - name: Build
        shell: pwsh
        run: |
          pyinstaller --onedir --windowed --name "遵农商_抖音客服助手" `
            --add-data "config.json;." `
            --add-data "worker.py;." `
            --add-data "chromedriver.exe;." `
            --add-data "replied_records;replied_records" `
            --add-data "chrome_profiles;chrome_profiles" `
            --add-data "comment_data;comment_data" `
            --collect-all PyQt5 `
            --collect-all selenium `
            main.py

      - name: Add readme
        shell: pwsh
        run: |
          @"
          遵农商·抖音客服助手 v$env:VERSION
          ===================================

          【使用前请确保已安装 Chrome 浏览器】
            如未安装，请先下载: https://www.google.cn/chrome/

          【使用方法】
            双击 遵农商_抖音客服助手.exe 即可运行
            首次使用需扫码登录抖音创作者平台

          【功能】
            - 多账号抖音私信自动回复
            - 多账号抖音评论自动回复

          遵义农商银行 出品
          "@ | Out-File -FilePath "dist\遵农商_抖音客服助手\使用说明.txt" -Encoding UTF8

      - name: Package zip
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\遵农商_抖音客服助手\*" -DestinationPath "遵农商_抖音客服助手_v$env:VERSION.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: "遵农商_抖音客服助手_v${{ env.VERSION }}"
          path: "dist/遵农商_抖音客服助手/**"

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ env.VERSION }}-${{ env.BUILD_ID }}"
          name: "遵农商·抖音客服助手 ${{ env.VERSION }} (Build ${{ env.BUILD_ID }})"
          files: "遵农商_抖音客服助手_v${{ env.VERSION }}.zip"
          prerelease: false
        continue-on-error: true
